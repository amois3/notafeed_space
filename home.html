<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Home — The Space</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&family=Playfair+Display:ital,wght@0,400;1,400&family=Syne:wght@700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="./src/design-tokens.css" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "accent": "#2B5BFF",
                        "accent-hover": "#1A44E0",
                        "accent-light": "#EEF2FF",
                        "bg-main": "#F5F4F1",
                        "border-c": "#E8E6E1",
                        "txt-primary": "#1A1A1A",
                        "txt-secondary": "#6B6B6B",
                        "txt-muted": "#AAAAAA",
                        "destructive": "#E53E3E",
                        "success": "#2D9B5A"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                        "display": ["Syne", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .masonry { columns: 3; column-gap: 12px; padding: 24px 20px 20px; }
        @media (max-width: 1200px) { .masonry { columns: 2; } }
        @media (max-width: 640px) { .masonry { columns: 1; padding: 16px 12px; } }
        .masonry-item { break-inside: avoid; margin-bottom: 12px; }
        .card-canvas { border-radius: var(--radius-card); overflow: hidden; position: relative; transition: transform var(--transition-hover), box-shadow var(--transition-hover); box-shadow: var(--shadow-card); }
        .card-canvas:hover { transform: translateY(-2px); box-shadow: var(--shadow-card-hover); }
        .card-classic { border-radius: var(--radius-card); overflow: hidden; background: var(--bg-card); border: 1px solid var(--border); padding: 20px; transition: transform var(--transition-hover), box-shadow var(--transition-hover); box-shadow: var(--shadow-card); }
        .card-classic:hover { transform: translateY(-2px); box-shadow: var(--shadow-card-hover); }
        .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 14px; background: rgba(0,0,0,0.35); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: space-between; }
        .filter-pill { padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all var(--transition-hover); white-space: nowrap; }
        .filter-pill.active { background: var(--accent); color: white; }
        .filter-pill:not(.active) { background: #EFEFED; color: var(--text-secondary); }
        .filter-pill:not(.active):hover { background: #E4E2DE; }
        .nav-link { font-size: 14px; font-weight: 500; color: var(--text-secondary); text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; transition: all var(--transition-hover); }
        .nav-link.active { color: var(--text-primary); border-bottom-color: var(--accent); }
        .nav-link:hover { color: var(--text-primary); }
        .bottom-nav { display: none; }
        @media (max-width: 640px) {
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); z-index: 100; padding: 8px 0 env(safe-area-inset-bottom, 8px); }
            .fab-btn { display: none !important; }
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2B5BFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>

<body class="font-sans min-h-screen" style="background: var(--bg-main); color: var(--text-primary)">
    <!-- Navbar 56px -->
    <header class="sticky top-0 z-50 border-b" style="height:56px; background: var(--bg-main); border-color: var(--border)">
        <div class="max-w-7xl mx-auto h-full px-5 flex items-center justify-between gap-4">
            <div class="flex items-center gap-6">
                <a class="flex items-center gap-2 text-accent" href="home.html">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M2 20C6 4 18 4 22 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/><path d="M2 4C6 20 18 20 22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="text-lg font-semibold tracking-wide hidden sm:block" style="color: var(--text-primary)">the space</span>
                </a>
                <nav class="hidden md:flex items-center gap-5">
                    <a class="nav-link active" href="home.html">Home</a>
                    <a class="nav-link" href="explore.html">Explore</a>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <!-- Search icon → expand -->
                <div class="relative" id="search-wrap">
                    <button id="search-toggle" class="p-2 rounded-full hover:bg-accent-light transition-colors" aria-label="Search">
                        <span class="material-symbols-outlined text-xl" style="color: var(--text-secondary)" aria-hidden="true">search</span>
                    </button>
                    <input id="search-input" type="text" placeholder="Search..."
                        class="absolute right-0 top-0 h-full opacity-0 w-0 transition-all duration-300 bg-bg-main border border-border-c rounded-full px-4 text-sm outline-none focus:ring-2 focus:ring-accent/30"
                        style="border-radius: 50px" />
                </div>
                <!-- Notifications -->
                <button class="relative p-2 rounded-full hover:bg-accent-light transition-colors" id="notif-btn" aria-label="Notifications">
                    <span class="material-symbols-outlined text-xl" style="color: var(--text-secondary)" aria-hidden="true">notifications</span>
                    <span id="notif-dot" class="absolute top-2 right-2 w-2 h-2 rounded-full bg-accent hidden"></span>
                </button>
                <!-- Avatar -->
                <a href="settings.html" id="nav-avatar" class="w-8 h-8 rounded-full bg-accent/10 flex items-center justify-center text-xs font-bold text-accent overflow-hidden" aria-label="Profile">?</a>
                <a href="login.html" id="nav-login-btn" class="hidden text-sm font-semibold" style="color: var(--text-primary)">Log in</a>
                <a href="register.html" id="nav-signup-btn" class="hidden text-sm font-semibold text-white px-4 py-2 bg-accent hover:bg-accent-hover transition-colors" style="border-radius: 50px">Sign up</a>
            </div>
        </div>
    </header>

    <!-- Notification Dropdown -->
    <div id="notif-dropdown" class="hidden fixed top-14 right-4 z-[200] w-[360px] max-h-[480px] bg-white border border-border-c overflow-y-auto" style="border-radius: var(--radius-modal); box-shadow: var(--shadow-modal)">
        <div class="p-4 border-b border-border-c flex items-center justify-between">
            <span class="font-semibold text-sm">Notifications</span>
            <button id="mark-all-read" class="text-xs text-accent font-medium hover:underline">Mark all as read</button>
        </div>
        <div id="notif-list" class="p-2">
            <div class="p-4 text-center text-sm" style="color: var(--text-muted)">All quiet here.</div>
        </div>
    </div>

    <!-- Filters -->
    <div class="max-w-7xl mx-auto px-5 pt-5 pb-2">
        <div class="flex items-center justify-between gap-4">
            <h2 class="text-xl font-bold">Your feed</h2>
            <div class="flex gap-2 overflow-x-auto no-scrollbar">
                <button class="filter-pill active" data-filter="all">All</button>
                <button class="filter-pill" data-filter="popular">Popular</button>
                <button class="filter-pill" data-filter="fresh">Fresh</button>
            </div>
        </div>
    </div>

    <!-- Feed -->
    <div id="feed-container" class="masonry max-w-7xl mx-auto"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 px-4 text-center">
        <div class="w-16 h-16 mb-4" style="color: var(--text-muted)">
            <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
        </div>
        <h3 class="text-lg font-semibold mb-1">Your canvas is quiet.</h3>
        <p class="text-sm mb-4" style="color: var(--text-secondary)">Follow creators or explore the space.</p>
        <a href="explore.html" class="text-sm font-semibold text-white px-5 py-2.5 bg-accent hover:bg-accent-hover transition-colors" style="border-radius: 50px">Go to Explore</a>
    </div>

    <!-- FAB -->
    <a class="fab-btn fixed z-[100] bg-accent text-white flex items-center justify-center hover:scale-105 transition-transform"
        href="compose_note.html" aria-label="Create a card"
        style="bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;box-shadow: var(--shadow-btn-primary)">
        <span class="material-symbols-outlined" style="font-size:24px" aria-hidden="true">add</span>
    </a>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav items-center justify-around">
        <a href="home.html" class="flex flex-col items-center gap-0.5 py-1 text-accent">
            <span class="material-symbols-outlined text-xl" aria-hidden="true">home</span>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="explore.html" class="flex flex-col items-center gap-0.5 py-1" style="color: var(--text-muted)">
            <span class="material-symbols-outlined text-xl" aria-hidden="true">explore</span>
            <span class="text-[10px] font-medium">Explore</span>
        </a>
        <a href="compose_note.html" class="flex items-center justify-center -mt-4 w-12 h-12 rounded-full bg-accent text-white shadow-lg" aria-label="Create a card">
            <span class="material-symbols-outlined text-2xl" aria-hidden="true">add</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center gap-0.5 py-1" style="color: var(--text-muted)">
            <span class="material-symbols-outlined text-xl" aria-hidden="true">person</span>
            <span class="text-[10px] font-medium">Profile</span>
        </a>
    </nav>

    <script type="module">
        import { getAllPosts, likePost, isLikedByCurrentUser, getLikesForPost, savePost, isSavedByCurrentUser, getCommentsForPost, showToast, escapeHtml } from './src/posts.js';
        import { getCurrentUser, getUserById, initDB, getUnreadCount, getNotifications, markAllRead } from './src/localDb.js';
        import { STICKER_CATEGORIES, getStickerSvg, isDarkBackground } from './src/stickers.js';

        initDB();
        const currentUser = getCurrentUser();

        // Nav auth state
        const avatar = document.getElementById('nav-avatar');
        const loginBtn = document.getElementById('nav-login-btn');
        const signupBtn = document.getElementById('nav-signup-btn');
        if (currentUser) {
            avatar.textContent = currentUser.fullname.charAt(0).toUpperCase();
            avatar.classList.remove('hidden');
            loginBtn.classList.add('hidden');
            signupBtn.classList.add('hidden');
        } else {
            avatar.classList.add('hidden');
            loginBtn.classList.remove('hidden');
            signupBtn.classList.remove('hidden');
        }

        // Notifications
        if (currentUser) {
            const count = getUnreadCount(currentUser.id);
            if (count > 0) document.getElementById('notif-dot').classList.remove('hidden');

            document.getElementById('notif-btn').addEventListener('click', () => {
                const dd = document.getElementById('notif-dropdown');
                dd.classList.toggle('hidden');
                if (!dd.classList.contains('hidden')) renderNotifications();
            });

            document.getElementById('mark-all-read').addEventListener('click', () => {
                markAllRead(currentUser.id);
                document.getElementById('notif-dot').classList.add('hidden');
                renderNotifications();
            });
        }

        function renderNotifications() {
            const list = document.getElementById('notif-list');
            const notifs = getNotifications(currentUser.id).slice(0, 20);
            if (notifs.length === 0) {
                list.innerHTML = '<div class="p-4 text-center text-sm" style="color:var(--text-muted)">All quiet here.</div>';
                return;
            }
            list.innerHTML = notifs.map(n => {
                const from = getUserById(n.fromUserId);
                const fromName = from ? from.fullname : 'Someone';
                const typeText = { like: 'liked your card', note: 'left a note', save: 'saved your card', follow: 'started following you' }[n.type] || '';
                const bg = n.read ? '' : 'background: var(--accent-light)';
                return `<div class="flex items-center gap-3 p-3 rounded-lg" style="${bg}">
                    <div class="w-8 h-8 rounded-full bg-accent/10 flex items-center justify-center text-xs font-bold text-accent flex-shrink-0">${escapeHtml(fromName.charAt(0))}</div>
                    <div class="flex-1 min-w-0"><span class="text-sm"><strong>${escapeHtml(fromName)}</strong> ${typeText}</span></div>
                </div>`;
            }).join('');
        }

        // Search
        const searchToggle = document.getElementById('search-toggle');
        const searchInput = document.getElementById('search-input');
        searchToggle.addEventListener('click', () => {
            const expanded = searchInput.style.width !== '0px' && searchInput.style.width !== '';
            if (expanded) {
                searchInput.style.width = '0px';
                searchInput.style.opacity = '0';
                searchInput.style.padding = '0';
            } else {
                searchInput.style.width = '240px';
                searchInput.style.opacity = '1';
                searchInput.style.padding = '0 16px';
                searchInput.focus();
            }
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const q = searchInput.value.trim();
                if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`;
            }
            if (e.key === 'Escape') {
                searchInput.style.width = '0px';
                searchInput.style.opacity = '0';
                searchInput.style.padding = '0';
                searchInput.blur();
            }
        });

        // Close dropdown on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#notif-btn') && !e.target.closest('#notif-dropdown')) {
                document.getElementById('notif-dropdown').classList.add('hidden');
            }
        });

        // ── Render Feed ──
        const feedContainer = document.getElementById('feed-container');
        const emptyState = document.getElementById('empty-state');

        function getCanvasHeight(cardSize) {
            switch (cardSize) {
                case 'small': return 200;
                case 'wide': return 200;
                case 'tall': return 360;
                case 'large': return 360;
                default: return 200;
            }
        }

        function renderCanvasElements(elements, bgColor) {
            return (elements || []).map(el => {
                if (el.type === 'text') {
                    const style = `left:${el.left};top:${el.top};transform:translate(-50%,-50%);font-family:${el.font || 'Inter'};font-size:${Math.min(el.fontSize || 20, 48)}px;color:${el.color || '#FFFFFF'};font-weight:${el.fontWeight || '400'};${el.italic ? 'font-style:italic;' : ''}`;
                    return `<div class="absolute max-w-[90%] text-center whitespace-pre-line" style="${style}">${escapeHtml(el.content)}</div>`;
                } else if (el.type === 'sticker') {
                    const sticker = STICKER_CATEGORIES.flatMap(c => c.stickers).find(s => s.id === el.stickerId);
                    if (!sticker) return '';
                    const svgHtml = getStickerSvg(sticker, bgColor);
                    return `<div class="absolute" style="left:${el.left};top:${el.top};transform:translate(-50%,-50%);width:48px;height:48px">${svgHtml}</div>`;
                }
                // Legacy emoji stickers
                if (el.classes) {
                    const scaledClasses = el.classes.replace('canvas-element', '').replace('cursor-move', '');
                    return `<div class="absolute max-w-[90%] text-center" style="left:${el.left};top:${el.top};transform:translate(-50%,-50%)"><div class="${scaledClasses}">${el.content}</div></div>`;
                }
                return '';
            }).join('');
        }

        function getActiveFilter() {
            const active = document.querySelector('.filter-pill.active');
            return active ? active.dataset.filter : 'all';
        }

        function renderFeed() {
            const filter = getActiveFilter();
            let posts = getAllPosts();
            if (filter === 'popular') {
                posts = [...posts].sort((a, b) => getLikesForPost(b.id).length - getLikesForPost(a.id).length);
            } else if (filter === 'fresh') {
                posts = [...posts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }
            if (posts.length === 0) {
                feedContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            feedContainer.classList.remove('hidden');
            emptyState.classList.add('hidden');

            feedContainer.innerHTML = posts.map((post) => {
                const author = getUserById(post.userId);
                const authorName = author ? author.fullname : 'Unknown';
                const authorUsername = author ? author.username : 'unknown';
                const isLiked = isLikedByCurrentUser(post.id);
                const likesCount = getLikesForPost(post.id).length;
                const isSaved = isSavedByCurrentUser(post.id);
                const heartIcon = isLiked ? 'favorite' : 'favorite_border';

                if (post.canvasData) {
                    const bgColor = post.canvasData.bgColor || '#FFFFFF';
                    const bgClass = post.canvasData.bgClass || '';
                    const height = getCanvasHeight(post.cardSize);
                    const elementsHtml = renderCanvasElements(post.canvasData.elements, bgColor);
                    const bgStyle = bgColor ? `background-color:${bgColor}` : '';
                    const bgClassAttr = bgClass && !bgColor ? bgClass : '';

                    return `<div class="masonry-item">
                        <div class="card-canvas ${bgClassAttr}" style="${bgStyle};height:${height}px">
                            <a href="single_note.html?id=${post.id}" class="absolute inset-0 z-10"></a>
                            ${elementsHtml}
                            <div class="card-overlay z-20">
                                <a href="user_profile.html?id=${post.userId}" class="flex items-center gap-2 relative z-30 min-w-0">
                                    <div class="w-6 h-6 rounded-full bg-white/20 backdrop-blur flex items-center justify-center text-[10px] font-bold text-white border border-white/30 flex-shrink-0">${escapeHtml(authorName.charAt(0))}</div>
                                    <span class="text-xs font-medium text-white truncate" style="font-family:Inter">@${escapeHtml(authorUsername)}</span>
                                </a>
                                <div class="flex items-center gap-1">
                                    <button class="relative z-30 like-btn flex items-center gap-1 p-1 rounded-full hover:bg-white/20 transition-colors" data-post-id="${post.id}" aria-label="Like">
                                        <span class="material-symbols-outlined text-sm ${isLiked ? 'text-rose-400' : 'text-white'}" aria-hidden="true">${heartIcon}</span>
                                        <span class="text-xs text-white font-medium like-count">${likesCount}</span>
                                    </button>
                                    <button class="relative z-30 save-btn p-1 rounded-full hover:bg-white/20 transition-colors" data-post-id="${post.id}" aria-label="Save">
                                        <span class="material-symbols-outlined text-sm ${isSaved ? 'text-amber-400' : 'text-white'}" aria-hidden="true">${isSaved ? 'bookmark' : 'bookmark_border'}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                } else {
                    // Classic card
                    const tagsHtml = post.tags?.length > 0
                        ? `<div class="flex flex-wrap gap-1.5 mb-3">${post.tags.map(tag => `<span class="text-[11px] font-bold uppercase px-2 py-0.5" style="background:var(--accent-light);color:var(--accent);border-radius:50px">#${escapeHtml(tag)}</span>`).join('')}</div>`
                        : '';
                    return `<div class="masonry-item">
                        <div class="card-classic">
                            <a href="single_note.html?id=${post.id}" class="block">
                                ${tagsHtml}
                                ${post.headline ? `<h3 class="font-semibold text-[15px] leading-snug mb-2" style="color:var(--text-primary)">${escapeHtml(post.headline)}</h3>` : ''}
                                <p class="text-sm leading-relaxed line-clamp-3" style="color:var(--text-secondary)">${escapeHtml(post.content)}</p>
                            </a>
                            <div class="flex items-center justify-between mt-4 pt-3 border-t" style="border-color: var(--border)">
                                <a class="flex items-center gap-2" href="user_profile.html?id=${post.userId}">
                                    <div class="w-6 h-6 rounded-full bg-accent/10 flex items-center justify-center text-[10px] font-bold text-accent">${escapeHtml(authorName.charAt(0))}</div>
                                    <span class="text-xs font-medium" style="color:var(--text-muted)">@${escapeHtml(authorUsername)}</span>
                                </a>
                                <div class="flex items-center gap-2">
                                    <button class="like-btn flex items-center gap-1" data-post-id="${post.id}" aria-label="Like">
                                        <span class="material-symbols-outlined text-sm ${isLiked ? 'text-rose-400' : ''}" style="${isLiked ? '' : 'color:var(--text-muted)'}" aria-hidden="true">${heartIcon}</span>
                                        <span class="text-xs font-medium like-count" style="color:var(--text-muted)">${likesCount}</span>
                                    </button>
                                    <button class="save-btn" data-post-id="${post.id}" aria-label="Save">
                                        <span class="material-symbols-outlined text-sm ${isSaved ? 'text-amber-500' : ''}" style="${isSaved ? '' : 'color:var(--text-muted)'}" aria-hidden="true">${isSaved ? 'bookmark' : 'bookmark_border'}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }
            }).join('');

            // Wire up like/save buttons
            feedContainer.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    if (!currentUser) { window.location.href = 'login.html'; return; }
                    try {
                        const result = likePost(btn.dataset.postId);
                        const icon = btn.querySelector('.material-symbols-outlined');
                        const count = btn.querySelector('.like-count');
                        let c = parseInt(count.textContent, 10) || 0;
                        if (result.liked) {
                            icon.textContent = 'favorite';
                            icon.className = 'material-symbols-outlined text-sm text-rose-400';
                            icon.style.color = '';
                            count.textContent = c + 1;
                        } else {
                            icon.textContent = 'favorite_border';
                            icon.className = 'material-symbols-outlined text-sm';
                            icon.style.color = 'var(--text-muted)';
                            count.textContent = Math.max(0, c - 1);
                            showToast('Unliked');
                        }
                    } catch (err) { showToast(err.message, true); }
                });
            });
            feedContainer.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    if (!currentUser) { window.location.href = 'login.html'; return; }
                    try {
                        const result = savePost(btn.dataset.postId);
                        const icon = btn.querySelector('.material-symbols-outlined');
                        if (result.saved) {
                            icon.textContent = 'bookmark';
                            icon.className = 'material-symbols-outlined text-sm text-amber-400';
                            showToast('Card saved');
                        } else {
                            icon.textContent = 'bookmark_border';
                            icon.className = 'material-symbols-outlined text-sm';
                            icon.style.color = 'var(--text-muted)';
                        }
                    } catch (err) { showToast(err.message, true); }
                });
            });
        }

        renderFeed();

        // Filters
        document.querySelectorAll('.filter-pill').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderFeed();
            });
        });
    </script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>

</html>
