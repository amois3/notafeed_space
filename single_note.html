<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Card — The Space</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="A visual composition on The Space — where every thought has shape, color, and form." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://notafeed.space/single_note.html" />

    <!-- Open Graph -->
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://notafeed.space/single_note.html" />
    <meta property="og:title" content="Card — The Space" />
    <meta property="og:description" content="A visual composition on The Space — where every thought has shape, color, and form." />
    <meta property="og:image" content="https://notafeed.space/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Space — a visual platform for ideas" />
    <meta property="og:site_name" content="The Space" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Card — The Space" />
    <meta name="twitter:description" content="A visual composition on The Space — where every thought has shape, color, and form." />
    <meta name="twitter:image" content="https://notafeed.space/og-image.png" />
    <meta name="twitter:image:alt" content="The Space — a visual platform for ideas" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&family=Playfair+Display:ital,wght@0,400;1,400&family=Syne:wght@700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="./src/design-tokens.css" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "accent": "#2B5BFF", "accent-hover": "#1A44E0", "accent-light": "#EEF2FF", "bg-main": "#F5F4F1", "border-c": "#E8E6E1", "txt-primary": "#1A1A1A", "txt-secondary": "#6B6B6B", "txt-muted": "#AAAAAA", "destructive": "#E53E3E" },
                    fontFamily: { "sans": ["Inter", "sans-serif"], "serif": ["Playfair Display", "serif"], "mono": ["JetBrains Mono", "monospace"], "display": ["Syne", "sans-serif"] },
                },
            },
        }
    </script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2B5BFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>

<body class="font-sans min-h-screen" style="background: var(--bg-main); color: var(--text-primary)">
    <!-- Minimal Navbar -->
    <header class="sticky top-0 z-50 border-b flex items-center justify-between px-5" style="height:56px; background: var(--bg-main); border-color: var(--border)">
        <a href="javascript:history.back()" class="flex items-center gap-2 text-sm font-medium hover:text-accent transition-colors" style="color: var(--text-secondary)">
            <span class="material-symbols-outlined text-lg" aria-hidden="true">arrow_back</span> Back
        </a>
        <button id="share-btn" class="flex items-center gap-2 text-sm font-medium hover:text-accent transition-colors" style="color: var(--text-secondary)">
            <span class="material-symbols-outlined text-lg" aria-hidden="true">ios_share</span> Share
        </button>
    </header>

    <main class="max-w-[600px] mx-auto px-4 py-8">
        <!-- Author -->
        <div id="author-section" class="flex items-center gap-3 mb-6"></div>

        <!-- Card -->
        <div id="card-container" class="mb-6"></div>

        <!-- Tags + Actions -->
        <div id="tags-section" class="flex flex-wrap gap-2 mb-4"></div>
        <div class="flex items-center gap-3 mb-8">
            <button id="like-btn" class="flex items-center gap-2 px-4 py-2 border text-sm font-medium transition-all hover:border-accent" style="border-radius: var(--radius-btn-secondary); border-color: var(--border); color: var(--text-secondary)">
                <span class="material-symbols-outlined text-lg" aria-hidden="true">favorite_border</span>
                <span id="like-count">0</span>
            </button>
            <button id="save-btn" class="flex items-center gap-2 px-4 py-2 border text-sm font-medium transition-all hover:border-accent" style="border-radius: var(--radius-btn-secondary); border-color: var(--border); color: var(--text-secondary)">
                <span class="material-symbols-outlined text-lg" aria-hidden="true">bookmark_border</span> Save
            </button>
        </div>

        <!-- Notes Section -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-base font-semibold flex items-center gap-2">Notes <span id="notes-count" class="text-sm font-normal" style="color: var(--text-muted)">· 0 attached</span></h3>
            </div>
            <div class="mb-6">
                <textarea id="note-input" rows="3" placeholder="Leave your note..." class="w-full bg-white border text-sm p-4 resize-none outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent" style="border-color: var(--border); border-radius: var(--radius-input)"></textarea>
                <div class="flex justify-end mt-2">
                    <button id="add-note-btn" class="bg-accent text-white font-semibold text-sm px-5 py-2 hover:bg-accent-hover transition-colors" style="border-radius: 50px">Post note</button>
                </div>
            </div>
            <div id="notes-list" class="flex flex-col gap-3"></div>
        </section>
    </main>

    <script type="module">
        import { getPostById, deletePost, likePost, isLikedByCurrentUser, getLikesForPost, addComment, getCommentsForPost, savePost, isSavedByCurrentUser, showToast, escapeHtml } from './src/posts.js';
        import { getUserById, getCurrentUser } from './src/localDb.js';
        import { STICKER_CATEGORIES, getStickerSvg } from './src/stickers.js';

        const postId = new URLSearchParams(window.location.search).get('id');
        const currentUser = getCurrentUser();

        if (!postId) {
            document.getElementById('card-container').innerHTML = '<p class="text-center py-20 text-lg font-semibold">Card not found</p>';
        } else {
            const post = getPostById(postId);
            if (!post) {
                document.getElementById('card-container').innerHTML = '<p class="text-center py-20 text-lg font-semibold">Card not found</p>';
            } else {
                const author = getUserById(post.userId);
                const authorName = author ? author.fullname : 'Unknown';

                // Author section
                const isOwner = currentUser && currentUser.id === post.userId;
                document.getElementById('author-section').innerHTML = `
                    <a href="user_profile.html?id=${post.userId}" class="w-10 h-10 rounded-full bg-accent/10 flex items-center justify-center text-sm font-bold text-accent flex-shrink-0">${escapeHtml(authorName.charAt(0))}</a>
                    <div class="flex-1 min-w-0">
                        <a href="user_profile.html?id=${post.userId}" class="font-semibold text-sm hover:text-accent transition-colors">${escapeHtml(authorName)}</a>
                        <p class="text-xs" style="color:var(--text-muted)">@${escapeHtml(author ? author.username : 'unknown')} · ${new Date(post.createdAt).toLocaleDateString()}</p>
                    </div>
                    ${isOwner ? `<div class="flex items-center gap-2 ml-auto">
                        <a href="compose_note.html?edit=${post.id}" class="flex items-center gap-1 px-3 py-1.5 border text-sm font-medium hover:border-accent hover:text-accent transition-all" style="border-radius:var(--radius-btn-secondary);border-color:var(--border);color:var(--text-secondary)">
                            <span class="material-symbols-outlined text-base" aria-hidden="true">edit</span> Edit
                        </a>
                        <button id="delete-post-btn" class="flex items-center gap-1 px-3 py-1.5 border text-sm font-medium hover:border-destructive hover:text-destructive transition-all" style="border-radius:var(--radius-btn-secondary);border-color:var(--border);color:var(--text-secondary)">
                            <span class="material-symbols-outlined text-base" aria-hidden="true">delete</span> Delete
                        </button>
                    </div>` : ''}`;

                // Card
                if (post.canvasData) {
                    const bgColor = post.canvasData.bgColor || '#FFFFFF';
                    const bgClass = post.canvasData.bgClass || '';
                    const elements = (post.canvasData.elements || []).map(el => {
                        if (el.type === 'text') {
                            return `<div class="absolute max-w-[90%] text-center whitespace-pre-line" style="left:${el.left};top:${el.top};transform:translate(-50%,-50%);font-family:${el.font||'Inter'};font-size:${el.fontSize||20}px;color:${el.color||'#FFF'};font-weight:${el.fontWeight||'400'};${el.italic?'font-style:italic':''}">
                                ${escapeHtml(el.content)}</div>`;
                        } else if (el.type === 'sticker') {
                            const sticker = STICKER_CATEGORIES.flatMap(c => c.stickers).find(s => s.id === el.stickerId);
                            if (!sticker) return '';
                            return `<div class="absolute" style="left:${el.left};top:${el.top};transform:translate(-50%,-50%);width:64px;height:64px">${getStickerSvg(sticker, bgColor)}</div>`;
                        }
                        if (el.classes) {
                            return `<div class="absolute" style="left:${el.left};top:${el.top};transform:translate(-50%,-50%)"><div class="${el.classes.replace('canvas-element','').replace('cursor-move','')}">${escapeHtml(el.content)}</div></div>`;
                        }
                        return '';
                    }).join('');

                    document.getElementById('card-container').innerHTML = `
                        <div class="relative w-full aspect-[4/5] overflow-hidden ${bgClass}" style="border-radius:var(--radius-card);background-color:${bgColor};box-shadow:var(--shadow-card-hover)">
                            ${elements}
                        </div>`;
                } else {
                    document.getElementById('card-container').innerHTML = `
                        <div class="bg-white border p-6 md:p-8" style="border-radius:var(--radius-card);border-color:var(--border)">
                            ${post.headline ? `<h1 class="text-2xl md:text-3xl font-bold mb-4">${escapeHtml(post.headline)}</h1>` : ''}
                            <p class="text-base leading-relaxed whitespace-pre-wrap" style="color:var(--text-secondary)">${escapeHtml(post.content)}</p>
                        </div>`;
                }

                // Tags
                if (post.tags?.length > 0) {
                    document.getElementById('tags-section').innerHTML = post.tags.map(t => `<span class="text-xs font-bold uppercase px-3 py-1" style="background:var(--accent-light);color:var(--accent);border-radius:50px">#${escapeHtml(t)}</span>`).join('');
                }

                // Like
                function updateLike() {
                    const isLiked = isLikedByCurrentUser(post.id);
                    const count = getLikesForPost(post.id).length;
                    const btn = document.getElementById('like-btn');
                    const icon = btn.querySelector('.material-symbols-outlined');
                    document.getElementById('like-count').textContent = count;
                    icon.textContent = isLiked ? 'favorite' : 'favorite_border';
                    if (isLiked) icon.style.color = 'var(--destructive)';
                    else icon.style.color = '';
                }
                updateLike();
                document.getElementById('like-btn').addEventListener('click', () => {
                    if (!currentUser) { window.location.href = 'login.html'; return; }
                    likePost(post.id);
                    updateLike();
                });

                // Save
                function updateSave() {
                    const saved = isSavedByCurrentUser(post.id);
                    const icon = document.querySelector('#save-btn .material-symbols-outlined');
                    icon.textContent = saved ? 'bookmark' : 'bookmark_border';
                    if (saved) icon.style.color = 'var(--accent)';
                    else icon.style.color = '';
                }
                updateSave();
                document.getElementById('save-btn').addEventListener('click', () => {
                    if (!currentUser) { window.location.href = 'login.html'; return; }
                    const result = savePost(post.id);
                    updateSave();
                    showToast(result.saved ? 'Card saved' : 'Removed from saved');
                });

                // Share
                document.getElementById('share-btn').addEventListener('click', () => {
                    navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied'));
                });

                // Delete (owner only)
                if (isOwner) {
                    document.getElementById('delete-post-btn').addEventListener('click', () => {
                        if (!confirm('Delete this card? This cannot be undone.')) return;
                        try {
                            deletePost(post.id);
                            showToast('Card deleted');
                            setTimeout(() => { window.location.href = 'home.html'; }, 500);
                        } catch (err) {
                            showToast(err.message, true);
                        }
                    });
                }

                // Notes
                function renderNotes() {
                    const notes = getCommentsForPost(post.id);
                    document.getElementById('notes-count').textContent = `· ${notes.length} attached`;
                    const list = document.getElementById('notes-list');
                    list.innerHTML = notes.map(note => {
                        const a = getUserById(note.userId);
                        return `<div class="flex gap-3 p-4 bg-white border" style="border-radius:var(--radius-input);border-color:var(--border)">
                            <div class="w-8 h-8 rounded-full bg-accent/10 flex items-center justify-center text-xs font-bold text-accent flex-shrink-0">${a ? escapeHtml(a.fullname.charAt(0)) : '?'}</div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-sm font-semibold">${a ? escapeHtml(a.fullname) : 'Unknown'}</span>
                                    <span class="text-xs" style="color:var(--text-muted)">${new Date(note.createdAt).toLocaleDateString()}</span>
                                </div>
                                <p class="text-sm whitespace-pre-wrap" style="color:var(--text-secondary)">${escapeHtml(note.content)}</p>
                            </div>
                        </div>`;
                    }).join('');
                }
                renderNotes();

                document.getElementById('add-note-btn').addEventListener('click', () => {
                    if (!currentUser) { window.location.href = 'login.html'; return; }
                    const val = document.getElementById('note-input').value.trim();
                    if (!val) return;
                    addComment(post.id, val);
                    document.getElementById('note-input').value = '';
                    renderNotes();
                    showToast('Note added');
                });

                // Ctrl+Enter to post note
                document.getElementById('note-input').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                        document.getElementById('add-note-btn').click();
                    }
                });
            }
        }
    </script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>

</html>
