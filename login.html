        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2B5BFF",
                        "primary-hover": "#1A44E0",
                        "primary-light": "#EEF2FF",
                        "background-light": "#F5F4F1",
                        "background-dark": "#0F1923",
                        "surface": "#FAFAF8",
                        "border-divider": "#E8E6E1",
                        "text-primary": "#1A1A1A",
                        "text-secondary": "#6B6B6B",
                        "text-muted": "#AAAAAA",
                        "destructive": "#E53E3E",
                        "success": "#2D9B5A"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                        "display": ["Syne", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title>Log In — The Space</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2B5BFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>

<body
    class="bg-background-light dark:bg-background-dark font-sans text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
    <div class="flex min-h-screen w-full flex-col lg:flex-row">
        <!-- Left Side: Visual/Quote Section -->
        <div
            class="relative hidden lg:flex lg:w-1/2 flex-col justify-between bg-primary p-12 text-white overflow-hidden">
            <div class="absolute inset-0 opacity-20">
                <div class="absolute inset-0 bg-gradient-to-br from-primary via-blue-600 to-indigo-900"
                    role="presentation"></div>
            </div>
            <div class="relative z-10">
                <div class="flex items-center gap-2.5">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"
                        class="text-white flex-shrink-0">
                    </svg>
                    <span class="text-2xl font-semibold tracking-wide mt-0.5 text-white">the space</span>
                </div>
            </div>
            <div class="relative z-10">
                <h1 class="text-5xl xl:text-6xl font-display font-light leading-tight italic">
                    "Simplicity is the ultimate sophistication."
                </h1>
                <p class="mt-6 text-lg text-white/80 font-medium">— Leonardo da Vinci</p>
            </div>
            <div class="relative z-10 flex gap-4">
                <div class="h-1 w-12 bg-white rounded-full"></div>
                <div class="h-1 w-4 bg-white/30 rounded-full"></div>
                <div class="h-1 w-4 bg-white/30 rounded-full"></div>
            </div>
        </div>
        <!-- Right Side: Login Form Section -->
        <div class="flex flex-1 flex-col justify-center px-6 py-12 lg:px-24 xl:px-32 bg-white dark:bg-background-dark">
            <div class="w-full max-w-md mx-auto">
                <header class="mb-10 lg:hidden flex items-center justify-between">
                    <div class="flex items-center gap-2.5 text-primary">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="flex-shrink-0"><path d="M2 20C6 4 18 4 22 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.4"/><path d="M2 4C6 20 18 20 22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span class="text-xl font-semibold tracking-wide text-slate-900 dark:text-slate-100 mt-0.5">the
                            board</span>
                    </div>
                </header>
                <div class="mb-4">
                    <h2 class="text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">Welcome back</h2>
                    <p class="mt-2 text-slate-500 dark:text-slate-400">Please enter your details to sign in to your
                        accounts.</p>
                </div>

                <div id="auth-error"
                    class="hidden mb-6 p-4 bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 text-sm rounded-lg font-medium border border-red-200 dark:border-red-800">
                </div>

                <form id="login-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="email">
                            Email Address
                        </label>
                        <input
                            class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                            id="email" placeholder="name@company.com" type="email" />
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
                                for="password">
                                Password
                            </label>
                            <a class="text-xs font-bold text-primary hover:underline" href="#">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <input
                                class="w-full h-12 px-4 pr-12 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                                id="password" placeholder="••••••••" type="password" />
                            <button
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
                                type="button" aria-label="Toggle password visibility">
                                <span class="material-symbols-outlined text-xl" aria-hidden="true">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input class="size-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember-me"
                            type="checkbox" />
                        <label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">Remember
                            me for 30 days</label>
                    </div>
                    <button
                        class="w-full h-12 bg-primary text-white font-bold hover:opacity-90 transition-opacity flex items-center justify-center gap-2"
                        style="border-radius: 50px"
                        type="submit">
                        Log in
                    </button>
                    <div class="relative my-8">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-white dark:bg-background-dark text-slate-500">Or continue with</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button
                            class="flex w-full items-center justify-center gap-3 rounded-lg border border-slate-200 dark:border-slate-800 px-3 py-2 text-sm font-semibold text-slate-900 dark:text-slate-100 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
                            type="button">
                            <svg class="h-5 w-5" viewbox="0 0 24 24">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4"></path>
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853"></path>
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                    fill="#FBBC05"></path>
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335"></path>
                            </svg>
                            Google
                        </button>
                        <button
                            class="flex w-full items-center justify-center gap-3 rounded-lg border border-slate-200 dark:border-slate-800 px-3 py-2 text-sm font-semibold text-slate-900 dark:text-slate-100 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-xl" aria-hidden="true">brand_awareness</span>
                            Apple
                        </button>
                    </div>
                </form>
                <p class="mt-10 text-center text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account?
                    <a class="font-bold text-primary hover:underline" href="register.html">Sign up</a>
                </p>
                <div class="mt-12 text-center">
                    <a class="inline-flex items-center gap-2 text-xs font-medium text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"
                        href="index.html">
                        <span class="material-symbols-outlined text-sm" aria-hidden="true">arrow_back</span>
                        Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { login } from './src/auth.js';
        import { getCurrentUser } from './src/localDb.js';

        // Redirect if already logged in
        if (getCurrentUser()) {
            window.location.href = 'home.html';
        }

        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('auth-error');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                login(email, password);
                window.location.href = 'home.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        });

        // Password visibility toggle
        const toggleBtn = document.querySelector('[aria-label="Toggle password visibility"]');
        const passwordInput = document.getElementById('password');
        if (toggleBtn && passwordInput) {
            toggleBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                toggleBtn.querySelector('.material-symbols-outlined').textContent = isPassword ? 'visibility_off' : 'visibility';
            });
        }
    </script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>

</html>
