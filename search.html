<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Search — The Space</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&family=Playfair+Display:ital,wght@0,400;1,400&family=Syne:wght@700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="./src/design-tokens.css" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "accent": "#2B5BFF", "accent-hover": "#1A44E0", "accent-light": "#EEF2FF", "bg-main": "#F5F4F1", "border-c": "#E8E6E1", "txt-primary": "#1A1A1A", "txt-secondary": "#6B6B6B", "txt-muted": "#AAAAAA" },
                    fontFamily: { "sans": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .masonry { columns: 3; column-gap: 12px; }
        @media (max-width: 1024px) { .masonry { columns: 2; } }
        @media (max-width: 640px) { .masonry { columns: 1; } }
        .masonry-item { break-inside: avoid; margin-bottom: 12px; }
        .card-thumb { border-radius: var(--radius-card); overflow: hidden; position: relative; box-shadow: var(--shadow-card); }
        .tab-btn { padding: 8px 16px; font-size: 14px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2B5BFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>

<body class="font-sans min-h-screen" style="background:var(--bg-main);color:var(--text-primary)">
    <header class="sticky top-0 z-50 border-b" style="height:56px;background:var(--bg-main);border-color:var(--border)">
        <div class="max-w-5xl mx-auto h-full px-5 flex items-center gap-4">
            <a href="javascript:history.back()" class="flex-shrink-0">
                <span class="material-symbols-outlined text-xl" style="color:var(--text-secondary)" aria-hidden="true">arrow_back</span>
            </a>
            <input id="search-input" type="text" placeholder="Search cards, people, tags..."
                class="flex-1 bg-transparent border-none text-base outline-none" autofocus />
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-5 py-6">
        <!-- Tabs -->
        <div class="border-b mb-6 flex gap-0" style="border-color:var(--border)">
            <button class="tab-btn active" data-tab="cards">Cards</button>
            <button class="tab-btn" data-tab="people">People</button>
            <button class="tab-btn" data-tab="tags">Tags</button>
        </div>

        <div id="tab-cards" class="tab-content"><div id="cards-results" class="masonry"></div></div>
        <div id="tab-people" class="tab-content hidden"><div id="people-results" class="flex flex-col gap-3"></div></div>
        <div id="tab-tags" class="tab-content hidden"><div id="tags-results" class="flex flex-wrap gap-2"></div></div>

        <div id="empty-state" class="hidden flex flex-col items-center py-20">
            <div class="w-16 h-16 mb-4" style="color:var(--text-muted)">
                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
            <p class="font-semibold">Nothing found.</p>
        </div>
    </main>

    <script type="module">
        import { searchPosts, escapeHtml } from './src/posts.js';
        import { getAllUsers, getUserById } from './src/localDb.js';
        import { STICKER_CATEGORIES, getStickerSvg } from './src/stickers.js';

        const q = new URLSearchParams(window.location.search).get('q') || '';
        const input = document.getElementById('search-input');
        input.value = q;

        function doSearch(query) {
            if (!query) return;
            const posts = searchPosts(query);
            const users = getAllUsers().filter(u => u.fullname.toLowerCase().includes(query.toLowerCase()) || u.username.toLowerCase().includes(query.toLowerCase()));
            const allPosts = JSON.parse(localStorage.getItem('posts') || '[]');
            const tags = [...new Set(allPosts.flatMap(p => p.tags || []))].filter(t => t.toLowerCase().includes(query.toLowerCase()));

            // Cards
            const cardsGrid = document.getElementById('cards-results');
            if (posts.length > 0) {
                cardsGrid.innerHTML = posts.map(post => {
                    if (post.canvasData) {
                        const bgColor = post.canvasData.bgColor || '#FFF';
                        const elements = (post.canvasData.elements || []).map(el => {
                            if (el.type === 'text') return `<div class="absolute max-w-[90%] text-center whitespace-pre-line" style="left:${el.left};top:${el.top};transform:translate(-50%,-50%);font-family:${el.font||'Inter'};font-size:${Math.min(el.fontSize||20,28)*0.7}px;color:${el.color||'#FFF'};font-weight:${el.fontWeight||'400'};${el.italic?'font-style:italic;':''}">${escapeHtml(el.content)}</div>`;
                            if (el.type === 'sticker') {
                                const sticker = STICKER_CATEGORIES.flatMap(c => c.stickers).find(s => s.id === el.stickerId);
                                if (!sticker) return '';
                                return `<div class="absolute" style="left:${el.left};top:${el.top};transform:translate(-50%,-50%);width:32px;height:32px">${getStickerSvg(sticker, bgColor)}</div>`;
                            }
                            return '';
                        }).join('');
                        return `<div class="masonry-item"><a href="single_note.html?id=${post.id}" class="card-thumb block" style="background-color:${bgColor};height:160px;position:relative">${elements}</a></div>`;
                    }
                    return `<div class="masonry-item"><a href="single_note.html?id=${post.id}" class="block bg-white border p-3" style="border-radius:var(--radius-card);border-color:var(--border)">
                        ${post.headline ? `<h4 class="font-semibold text-sm mb-1">${escapeHtml(post.headline)}</h4>` : ''}
                        <p class="text-xs line-clamp-2" style="color:var(--text-secondary)">${escapeHtml(post.content)}</p>
                    </a></div>`;
                }).join('');
            }

            // People
            document.getElementById('people-results').innerHTML = users.map(u => `
                <a href="user_profile.html?id=${u.id}" class="flex items-center gap-3 p-3 bg-white border hover:shadow-sm transition-all" style="border-radius:var(--radius-input);border-color:var(--border)">
                    <div class="w-10 h-10 rounded-full bg-accent/10 flex items-center justify-center text-sm font-bold text-accent">${escapeHtml(u.fullname.charAt(0))}</div>
                    <div><span class="font-semibold text-sm">${escapeHtml(u.fullname)}</span><br/><span class="text-xs" style="color:var(--text-muted)">@${escapeHtml(u.username)}</span></div>
                </a>`).join('') || '<p class="text-sm" style="color:var(--text-muted)">No people found.</p>';

            // Tags
            document.getElementById('tags-results').innerHTML = tags.map(t => `
                <a href="search.html?q=${encodeURIComponent(t)}" class="text-sm font-bold px-4 py-2 hover:bg-accent hover:text-white transition-colors" style="background:var(--accent-light);color:var(--accent);border-radius:50px">#${t}</a>`).join('') || '<p class="text-sm" style="color:var(--text-muted)">No tags found.</p>';

            const hasResults = posts.length > 0 || users.length > 0 || tags.length > 0;
            document.getElementById('empty-state').classList.toggle('hidden', hasResults);
        }

        if (q) doSearch(q);

        let debounce;
        input.addEventListener('input', () => {
            clearTimeout(debounce);
            debounce = setTimeout(() => {
                const val = input.value.trim();
                if (val) {
                    history.replaceState(null, '', `search.html?q=${encodeURIComponent(val)}`);
                    doSearch(val);
                }
            }, 300);
        });

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
            });
        });
    </script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}</script>
</body>

</html>
